openapi: 3.0.0
info:
  title: Blog API
  description: API REST para gestionar autores y posts
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /authors:
    get:
      summary: Listar autores
      responses:
        '200':
          description: Lista de autores
    post:
      summary: Crear autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        '201':
          description: Autor creado
        '400':
          description: Datos inválidos
  /authors/{id}:
    get:
      summary: Obtener autor por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Autor encontrado
        '404':
          description: Autor no encontrado
    put:
      summary: Actualizar autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        '200':
          description: Autor actualizado
        '404':
          description: Autor no encontrado
    delete:
      summary: Eliminar autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Autor eliminado
        '404':
          description: Autor no encontrado
  /posts:
    get:
      summary: Listar posts
      responses:
        '200':
          description: Lista de posts
    post:
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [author_id, title, content]
              properties:
                author_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean
      responses:
        '201':
          description: Post creado
        '400':
          description: Datos inválidos
  /posts/{id}:
    get:
      summary: Obtener post por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post encontrado
        '404':
          description: Post no encontrado
    put:
      summary: Actualizar post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [author_id, title, content]
              properties:
                author_id:
                  type: integer
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean
      responses:
        '200':
          description: Post actualizado
        '404':
          description: Post no encontrado
    delete:
      summary: Eliminar post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Post eliminado
        '404':
          description: Post no encontrado
  /posts/author/{authorId}:
    get:
      summary: Posts por autor
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de posts del autor