openapi: 3.0.0
info:
  title: Blog API
  description: API REST para gestionar autores y posts
  version: 1.0.0
servers:
  - url: https://proyectom2leonelfernandez-production.up.railway.app
  - url: http://localhost:3000

components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          example: juan@email.com
        bio:
          type: string
          example: Developer y entrenador
        created_at:
          type: string
          format: date-time
          example: 2026-01-01T00:00:00.000Z
    AuthorInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          example: juan@email.com
        bio:
          type: string
          example: Developer y entrenador
    AuthorUpdateInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Juan Actualizado
        email:
          type: string
          example: juan@email.com
        bio:
          type: string
          example: Bio actualizada
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Contenido del post
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2026-01-01T00:00:00.000Z
    PostInput:
      type: object
      required: [author_id, title, content]
      properties:
        author_id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Contenido del post
        published:
          type: boolean
          example: false
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error

paths:
  /authors:
    get:
      summary: Obtener todos los autores
      tags: [Authors]
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Crear un nuevo autor
      tags: [Authors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Autor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /authors/{id}:
    get:
      summary: Obtener un autor por ID
      tags: [Authors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar un autor (soporta actualización parcial)
      tags: [Authors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorUpdateInput'
      responses:
        '200':
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar un autor
      tags: [Authors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Autor eliminado
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts:
    get:
      summary: Obtener todos los posts
      tags: [Posts]
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Crear un nuevo post
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/{id}:
    get:
      summary: Obtener un post por ID
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar un post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Post eliminado
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/author/{authorId}:
    get:
      summary: Obtener posts de un autor
      tags: [Posts]
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'